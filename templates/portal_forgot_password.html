{% extends "portal_layout.html" %}

{% block content %}
<div class="card">
    <h3 style="margin-top: 0; color: #555;">找回密码安全中心</h3>
    <p style="font-size: 14px; color: #666;">通过您注册时预留的密保问题，可以重置登录密码。</p>
</div>

{% if step == "1" %}
    <form method="POST">
        <input type="hidden" name="step" value="1">
        <div class="form-group">
            <label>请输入您需要找回密码的用户名</label>
            <input type="text" name="username" required>
        </div>
        <button type="submit">下一步：验证密保</button>
    </form>

{% elif step == "2" %}
    <form method="POST">
        <input type="hidden" name="step" value="2">
        <input type="hidden" name="username" value="{{ username }}">
        <input type="hidden" name="question_hidden" value="{{ question }}">
        
        <div class="form-group">
            <label>当前找回账号: <strong style="color:#007BFF;">{{ username }}</strong></label>
        </div>
        
        <div class="form-group">
            <label style="color:#d9534f;">您的密保问题：</label>
            <div style="padding: 10px; background: #fdfdfd; border: 1px dashed #ccc; font-weight: bold;">
                {{ question }}
            </div>
        </div>
        
        <div class="form-group">
            <label>请输入密保答案</label>
            <input type="text" name="answer" required>
        </div>
        
        <div class="form-group">
            <label>设置新密码</label>
            <input type="password" name="new_password" required>
        </div>
        
        <button type="submit" style="background:#28a745;">确认重置密码</button>
    </form>
{% endif %}
{% endblock %}
