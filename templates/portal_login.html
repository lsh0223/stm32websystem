{% extends "portal_layout.html" %}

{% block content %}
<form method="POST">
    <div class="form-group"><label>用户名</label><input type="text" name="username" required></div>
    <div class="form-group"><label>密码</label><input type="password" name="password" required></div>
    
    <div style="text-align: right; margin-bottom: 15px;">
        <a href="/portal/forgot_password" style="font-size: 14px; color: #007BFF; text-decoration: underline;">忘记密码？找回密码</a>
    </div>

    <button type="submit">登 录</button>
</form>
{% endblock %}
